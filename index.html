<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>PiDEX Util</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>

  <div id="login-screen" class="screen">
    <div class="login-box">
      <h1 class="app-title">PiDEX Util</h1>
      <p class="app-sub">Testnet Only · 테스트넷 전용</p>
      <button id="btn-login" class="btn-primary btn-lg">Connect Pi Wallet · Pi 지갑 연결</button>
      <p class="login-note">Requires Pi Browser &nbsp;·&nbsp; Pi Browser 전용</p>
    </div>
  </div>

  <div id="app-screen" class="screen hidden">
    <header class="app-header">
      <span class="header-title">PiDEX Util</span>
      <div class="header-right">
        <span id="header-sub-badge" class="sub-badge hidden">구독중</span>
        <span id="header-username" class="header-user">-</span>
      </div>
    </header>

    <main class="page-container">
      <div id="page-dashboard" class="page"></div>
      <div id="page-lp"        class="page hidden"></div>
      <div id="page-arbitrage" class="page hidden"></div>
      <div id="page-swap"      class="page hidden"></div>
      <div id="page-wallet"    class="page hidden"></div>
      <div id="page-sub"       class="page hidden"></div>
    </main>

    <nav class="bottom-nav">
      <button class="nav-tab active" data-page="dashboard">
        <span class="nav-icon">📊</span>
        <span class="nav-label">덱스<br><span class="nav-en">DEX</span></span>
      </button>
      <button class="nav-tab" data-page="lp">
        <span class="nav-icon">💧</span>
        <span class="nav-label">LP 계산<br><span class="nav-en">LP Calc</span></span>
      </button>
      <button class="nav-tab" data-page="arbitrage">
        <span class="nav-icon">🔄</span>
        <span class="nav-label">차익 탐색<br><span class="nav-en">Arb Finder</span></span>
      </button>
      <button class="nav-tab" data-page="swap">
        <span class="nav-icon">⇄</span>
        <span class="nav-label">스왑<br><span class="nav-en">Swap</span></span>
      </button>
      <button class="nav-tab nav-tab-hidden" data-page="wallet">
        <span class="nav-icon">👛</span>
        <span class="nav-label">지갑<br><span class="nav-en">Wallet</span></span>
      </button>
      <button class="nav-tab" data-page="sub">
        <span class="nav-icon">ℹ️</span>
        <span class="nav-label">정보<br><span class="nav-en">Info</span></span>
      </button>
    </nav>
  </div>

  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner"></div>
    <p id="loading-msg">처리 중...</p>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
