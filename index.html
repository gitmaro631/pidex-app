<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>PiDEX Util</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>

  <div id="login-screen" class="screen">
    <div class="login-box">
      <h1 class="app-title">PiDEX Util</h1>
      <p class="app-sub">Testnet Only · 테스트넷 전용</p>
      <button id="btn-login" class="btn-primary btn-lg btn-login-main">
        PiDEX 시작하기<br><span class="login-btn-en">Start PiDEX Util</span>
      </button>
      <p class="login-note">Requires Pi Browser &nbsp;·&nbsp; Pi Browser 전용</p>
      <p id="login-error" class="login-error-msg" style="display:none;"></p>
    </div>
  </div>

  <div id="app-screen" class="screen hidden">
    <header class="app-header">
      <div class="header-row1">
        <span style="min-width:60px;"></span>
        <span class="header-title">PiDEX Util</span>
        <span id="header-username" class="header-user">-</span>
      </div>
      <div class="header-row2">
        <div id="header-buttons"></div>
        <span id="header-sub-badge" class="sub-badge hidden">구독중</span>
        <div id="lang-switch"></div>
      </div>
    </header>

    <main class="page-container">
      <div id="page-dashboard" class="page"></div>
      <div id="page-lp"        class="page hidden"></div>
      <div id="page-arbitrage" class="page hidden"></div>
      <div id="page-swap"      class="page hidden"></div>
      <div id="page-wallet"    class="page hidden"></div>
      <div id="page-sub"       class="page hidden"></div>
    </main>

    <nav class="bottom-nav">
      <button class="nav-tab active" data-page="dashboard">
        <span class="nav-icon">📊</span>
        <span class="nav-label"><span class="nav-label-main">덱스</span></span>
      </button>
      <button class="nav-tab" data-page="lp">
        <span class="nav-icon">💧</span>
        <span class="nav-label"><span class="nav-label-main">LP 계산</span></span>
      </button>
      <button class="nav-tab" data-page="arbitrage">
        <span class="nav-icon">🔄</span>
        <span class="nav-label"><span class="nav-label-main">차익 탐색</span></span>
      </button>
      <button class="nav-tab" data-page="swap">
        <span class="nav-icon">⇄</span>
        <span class="nav-label"><span class="nav-label-main">스왑</span></span>
      </button>
      <button class="nav-tab nav-tab-hidden" data-page="wallet">
        <span class="nav-icon">👛</span>
        <span class="nav-label"><span class="nav-label-main">지갑</span></span>
      </button>
      <button class="nav-tab nav-tab-hidden" data-page="sub">
        <span class="nav-icon">ℹ️</span>
        <span class="nav-label"><span class="nav-label-main">정보</span></span>
      </button>
    </nav>
  </div>

  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner"></div>
    <p id="loading-msg">처리 중...</p>
  </div>

  <div id="utils-overlay" class="utils-overlay hidden">
    <div id="utils-panel"></div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
